<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; color: #222; }
    #empty { padding: 32px 16px; text-align: center; color: #999; }
    .row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; border-bottom: 1px solid #eee;
      transition: background 0.15s;
    }
    .row.clickable { cursor: pointer; }
    .row.clickable:hover { background: #f5f5f5; }
    .row.copied { background: #d4edda; }
    .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { font-size: 14px; font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
    .value a.link { color: #0366d6; text-decoration: none; }
    .value a.link:hover { text-decoration: underline; }
    .copy-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; opacity: 0.6; }
    .copy-btn:hover { opacity: 1; }
  </style>
</head>
<body>
  <div id="list"></div>
  <div id="empty">No data — waiting for a push</div>
  <script src="sidepanel.js"></script>
</body>
</html>
