<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-label: 'Space Grotesk', sans-serif;
      --font-value: 'JetBrains Mono', monospace;
      --bg:         #0b0d12;
      --bg-row:     #141821;
      --border:     #1f2633;
      --accent:     #5eead4;
      --copied:     #ff4d8f;
      --text:       #e8ecf5;
      --text-dim:   #6b7590;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-value);
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    #empty {
      padding: 48px 16px;
      text-align: center;
      color: var(--text-dim);
      font-family: var(--font-label);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-row);
      transition: background 0.2s ease;
    }

    .row.clickable { cursor: pointer; }
    .row.clickable:hover { background: #1a1f2b; }
    .row.copied { background: var(--copied); color: var(--bg); }
    .row.copied .label { color: var(--bg); }

    .label {
      font-family: var(--font-label);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .value {
      font-family: var(--font-value);
      font-weight: 300;
      font-size: 13px;
      word-break: break-all;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .value a.link {
      color: var(--accent);
      text-decoration: none;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .value a.link:hover { text-decoration: underline; }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font-label);
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 3px 7px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <div id="list"></div>
  <div id="empty">Awaiting Payload</div>
  <script src="sidepanel.js"></script>
</body>
</html>
